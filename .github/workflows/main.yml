name: moriarty_runner
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Start
        run: echo "Test begun"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: SonarQube Scan
        # Example if using the SonarQube GitHub Action
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}       
